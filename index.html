<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Khan Construction provides premium civil engineering, residential, commercial, and road construction services.">
  <title>Khan Construction | Premium Civil Engineering</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #e8a020;
      --primary-light: #f5b030;
      --dark: #0a0a0a;
      --dark2: #111111;
      --dark3: #1a1a1a;
      --dark4: #222222;
      --text: #bbbbbb;
      --text-light: #888888;
      --white: #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ===================== PRELOADER ===================== */
    .preloader {
      position: fixed;
      inset: 0;
      background: var(--dark);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      transition: opacity 0.6s ease;
    }

    .preloader.hidden { opacity: 0; pointer-events: none; }

    .preloader-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--white);
    }

    .preloader-logo span { color: var(--primary); }

    .loader-bar {
      width: 200px;
      height: 2px;
      background: var(--dark3);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 0;
      background: var(--primary);
      animation: load 1.5s ease forwards;
    }

    @keyframes load { to { width: 100%; } }

    /* ===================== NAVBAR ===================== */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 0 2rem;
      height: 75px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.4s ease;
    }

    .navbar.scrolled {
      background: rgba(10,10,10,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(232,160,32,0.15);
      height: 65px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      text-decoration: none;
      color: var(--white);
    }

    .logo-icon-wrap {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon-wrap i { color: var(--dark); width: 22px; height: 22px; }

    .logo-text { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; }
    .logo-text span { color: var(--primary); }
    .logo-tagline { font-size: 0.65rem; color: var(--text-light); letter-spacing: 0.15em; text-transform: uppercase; }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 2rem;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.3s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 2px;
      background: var(--primary);
      transition: width 0.3s;
    }

    .nav-links a:hover { color: var(--primary); }
    .nav-links a:hover::after { width: 100%; }

    .nav-btn {
      background: var(--primary) !important;
      color: var(--dark) !important;
      padding: 0.55rem 1.4rem !important;
      border-radius: 4px;
      font-weight: 700 !important;
    }

    .nav-btn::after { display: none !important; }
    .nav-btn:hover { background: var(--primary-light) !important; color: var(--dark) !important; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 5px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--white);
      transition: all 0.3s;
    }

    /* ===================== HERO ===================== */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('hero_bg.png');
      background-size: cover;
      background-position: center;
      transform: scale(1.05);
      animation: zoomOut 8s ease forwards;
    }

    @keyframes zoomOut { to { transform: scale(1); } }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.75) 50%,
        rgba(0,0,0,0.4) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      padding-top: 75px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(232,160,32,0.1);
      border: 1px solid rgba(232,160,32,0.3);
      color: var(--primary);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s 0.3s both;
    }

    .hero-badge i { width: 14px; height: 14px; }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.8s 0.5s both;
    }

    .hero h1 span {
      color: var(--primary);
      display: block;
    }

    .hero p {
      font-size: clamp(1rem, 1.5vw, 1.2rem);
      line-height: 1.8;
      max-width: 580px;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.8s 0.7s both;
    }

    .hero-btns {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      animation: fadeUp 0.8s 0.9s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2.2rem;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.88rem;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--dark);
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(232,160,32,0.4);
    }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.4);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-3px);
    }

    .hero-stats {
      display: flex;
      gap: 3rem;
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      animation: fadeUp 0.8s 1.1s both;
    }

    .hero-stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--primary);
      font-weight: 700;
      line-height: 1;
    }

    .hero-stat-label {
      font-size: 0.78rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }

    .hero-scroll {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-light);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 2;
      animation: bounce 2s infinite;
    }

    .hero-scroll i { color: var(--primary); width: 18px; height: 18px; }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ===================== ABOUT ===================== */
    .section { padding: 6rem 2rem; }
    .container { max-width: 1100px; margin: 0 auto; }

    .section-label {
      color: var(--primary);
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 700;
      display: block;
      margin-bottom: 0.8rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    .about-img-wrap { position: relative; }

    .about-img-wrap img {
      width: 100%;
      height: 520px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .about-badge {
      position: absolute;
      bottom: -25px;
      right: -25px;
      background: var(--primary);
      color: var(--dark);
      width: 130px;
      height: 130px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      text-align: center;
      box-shadow: 0 15px 40px rgba(232,160,32,0.4);
    }

    .about-badge .num { font-size: 2.2rem; font-weight: 900; line-height: 1; }
    .about-badge .txt { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }

    .about-text p { line-height: 1.9; margin-bottom: 1.2rem; }

    .about-points {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin: 1.8rem 0 2rem;
    }

    .about-point {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--white);
    }

    .about-point i { color: var(--primary); width: 16px; height: 16px; flex-shrink: 0; }

    /* ===================== SERVICES ===================== */
    .services-section { background: var(--dark2); }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .service-card {
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 2.2rem;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--primary);
      transform: scaleX(0);
      transition: transform 0.35s ease;
    }

    .service-card:hover {
      border-color: rgba(232,160,32,0.25);
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .service-card:hover::before { transform: scaleX(1); }

    .service-icon {
      width: 56px;
      height: 56px;
      background: rgba(232,160,32,0.08);
      border: 1px solid rgba(232,160,32,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.3rem;
      transition: all 0.3s;
    }

    .service-card:hover .service-icon {
      background: rgba(232,160,32,0.18);
      border-color: rgba(232,160,32,0.5);
    }

    .service-icon i { color: var(--primary); width: 26px; height: 26px; }

    .service-card h3 {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      font-size: 1.2rem;
      margin-bottom: 0.8rem;
    }

    .service-card p { font-size: 0.9rem; line-height: 1.7; }

    .service-card-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      margin-top: 1.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: gap 0.3s;
    }

    .service-card-cta:hover { gap: 0.7rem; }
    .service-card-cta i { width: 14px; height: 14px; }

    /* ===================== WHY US ===================== */
    .whyus-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .whyus-img {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
    }

    .whyus-img img {
      width: 100%;
      height: 500px;
      object-fit: cover;
      display: block;
    }

    .whyus-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(232,160,32,0.2), transparent);
    }

    .features-list {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin-top: 2rem;
    }

    .feature-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.2rem;
      background: var(--dark3);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.04);
      transition: border-color 0.3s;
    }

    .feature-item:hover { border-color: rgba(232,160,32,0.25); }

    .feature-icon {
      width: 42px;
      height: 42px;
      background: rgba(232,160,32,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon i { color: var(--primary); width: 18px; height: 18px; }
    .feature-item h4 { color: var(--white); font-size: 0.95rem; margin-bottom: 0.25rem; }
    .feature-item p { font-size: 0.85rem; line-height: 1.5; }

    /* ===================== STATS ===================== */
    .stats-section {
      background: linear-gradient(135deg, #0f0800, #0a0a0a, #0f0800);
      padding: 5rem 2rem;
      border-top: 1px solid rgba(232,160,32,0.1);
      border-bottom: 1px solid rgba(232,160,32,0.1);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      text-align: center;
    }

    .stat-item { padding: 1.5rem; }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      color: var(--primary);
      font-weight: 900;
      line-height: 1;
    }

    .stat-divider {
      width: 30px;
      height: 2px;
      background: var(--primary);
      margin: 0.8rem auto;
      opacity: 0.5;
    }

    .stat-label {
      color: var(--text);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    /* ===================== PROJECTS ===================== */
    .projects-section { background: var(--dark2); }

    .projects-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 1.5rem;
    }

    .filter-bar {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .filter-btn {
      padding: 0.5rem 1.3rem;
      border-radius: 4px;
      border: 1px solid rgba(232,160,32,0.25);
      background: transparent;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--primary);
      color: var(--dark);
      border-color: var(--primary);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .project-card {
      border-radius: 10px;
      overflow: hidden;
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.35s ease;
      position: relative;
    }

    .project-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      border-color: rgba(232,160,32,0.25);
    }

    .project-card.hidden { display: none; }

    .project-img-wrap { overflow: hidden; position: relative; }

    .project-img-wrap img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .project-card:hover .project-img-wrap img { transform: scale(1.07); }

    .proj-badge {
      position: absolute;
      top: 1rem; left: 1rem;
      background: var(--primary);
      color: var(--dark);
      padding: 0.28rem 0.8rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .project-info { padding: 1.6rem; }

    .project-info h3 {
      font-family: 'Playfair Display', serif;
      color: var(--white);
      font-size: 1.2rem;
      margin-bottom: 0.6rem;
    }

    .project-info p { font-size: 0.88rem; line-height: 1.7; }

    .project-meta {
      display: flex;
      gap: 1.2rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--text-light);
    }

    .meta-item i { color: var(--primary); width: 13px; height: 13px; }

    /* ===================== TESTIMONIALS ===================== */
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .testimonial-card {
      background: var(--dark3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 2rem;
      position: relative;
      transition: border-color 0.3s, transform 0.3s;
    }

    .testimonial-card:hover {
      border-color: rgba(232,160,32,0.25);
      transform: translateY(-5px);
    }

    .quote-icon {
      color: var(--primary);
      opacity: 0.3;
      font-size: 4rem;
      font-family: Georgia, serif;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .stars {
      display: flex;
      gap: 3px;
      margin-bottom: 1rem;
    }

    .stars i { color: var(--primary); width: 14px; height: 14px; }

    .testimonial-card p {
      font-size: 0.9rem;
      line-height: 1.8;
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .author-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--dark);
      font-weight: 700;
      flex-shrink: 0;
    }

    .author-name {
      color: var(--white);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .author-role { color: var(--text-light); font-size: 0.78rem; }

    /* ===================== CONTACT ===================== */
    .contact-section { background: var(--dark2); }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 4rem;
      align-items: start;
    }

    .contact-info h2 { margin-bottom: 1rem; }
    .contact-info p { line-he
